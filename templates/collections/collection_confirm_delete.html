{% extends "main/base.html" %}
{% block content %}
  <h1>Удалить коллекцию</h1>
  <p>Вы уверены, что хотите удалить коллекцию «{{ collection.title }}»?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit">🗑 Да, удалить</button>
    <a href="{% url 'collection_list' %}">Отмена</a>
  </form>
{% endblock %}
